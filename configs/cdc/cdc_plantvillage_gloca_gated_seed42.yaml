experiment:
  name: gloca_gated
  seed: 42
  output_dir: outputs/main_experiments

dataset:
  name: plantvillage
  limit_per_class:
  include_classes:
  training_views: cdc_weak_strong_calibration

backbone:
  family: dinov2
  variant: facebook/dinov2-small
  freeze: true
  image_size: 224

gloca:
  enabled: true
  name: gloca_gated
  embedding_dim: 384
  alpha_init: 0.0
  normalize_output: true
  attention_hidden_dim: 384
  mlp_hidden_dim: 768

head:
  name: cdc
  n_clusters: auto
  training_mode: cdc

cdc:
  embedding_dim: 384
  hidden_dim: 512
  training_views: cdc_weak_strong_calibration
  meta_batch_size: 2048
  sub_batch_size: 256
  per_class_selected_num: auto
  calibration_k: 128
  meta_batch_drop_last: false
  w_en: 1.0
  prototype_init: true
  orthogonalize_init: true
  kmeans_init: kmeans++
  kmeans_n_init: 10
  kmeans_max_iter: 100
  kmeans_tol: 1.0e-4
  weight_decay: 0.0
  optimizer: adamw
  gloca_lr_multiplier: 1.0
  gloca_alpha_lr_multiplier: 1.0
  freeze_gloca: false
  freeze_gloca_epochs: 0
  log_gloca_diagnostics: true
  progress: true
  augment:
    weak:
      name: current_train
    strong:
      name: randaugment_cutout
      randaugment_n: 4
      cutout_enabled: true
      cutout_n_holes: 1
      cutout_length: 56
    calibration:
      name: deterministic_prediction

prediction:
  deterministic: true
  export_embeddings: true
  export_attention: true

trainer:
  max_epochs: 50
  batch_size: 256
  lr: 1.0e-4
  accelerator: auto
  precision: 32
  matmul_precision: high
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  checkpoint_interval: 5
  eval_interval: checkpoint
  resume_from_checkpoint: auto
  profile_resources: true
