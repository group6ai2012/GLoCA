experiment:
  name: propos_cls_full_200ep
  seed: 42
  output_dir: outputs/propos_full

dataset:
  name: plantwild
  limit_per_class:
  include_classes:
  training_views: auto

backbone:
  family: dinov2
  variant: facebook/dinov2-small
  freeze: true
  image_size: 224

gloca:
  enabled: false
  name: disabled
  embedding_dim: 384
  normalize_output: true

head:
  name: propos
  n_clusters: auto
  training_mode: contrastive_two_view

propos:
  embedding_dim: 384
  projection_dim: 256
  projection_hidden_dim: 512
  predictor_hidden_dim: 512
  temperature: 0.5
  sigma: 0.001
  lambda_psl: 0.1
  ema_momentum: 0.996
  ema_momentum_max: 1.0
  ema_momentum_increase: true
  kmeans_interval: 1
  kmeans_init: kmeans++
  kmeans_n_init: 10
  kmeans_max_iter: 300
  kmeans_tol: 1.0e-4
  warmup_epochs: 10
  predictor_lr_multiplier: 10.0
  weight_decay: 1.0e-4
  optimizer: adamw
  symmetric_loss: true
  profile_batches: false
  gloca_lr_multiplier: 1.0
  gloca_alpha_lr_multiplier: 1.0
  freeze_gloca: false
  freeze_gloca_epochs: 0
  log_gloca_diagnostics: false

prediction:
  deterministic: true
  export_embeddings: true
  export_attention: true

trainer:
  max_epochs: 200
  batch_size: 128
  lr: 5.0e-4
  accelerator: auto
  precision: 32
  matmul_precision: high
  num_workers: 4
